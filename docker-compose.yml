version: "3.9"

services:
  aura-bot:
    build: .
    container_name: aura-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - xray

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray
    restart: always
    volumes:
      - ./xray/config.json:/etc/xray/config.json
    command:
      - run
      - -c
      - /etc/xray/config.json